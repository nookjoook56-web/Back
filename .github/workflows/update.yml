name: Vavoo Liste Guncelle
on:
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir çalışır
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Gereksinimleri Yukle
        run: pip install requests
      - name: Listeyi Olustur
        run: python main.py
      - name: Github'a Gonder
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vavoo_to_list.m3u
          git commit -m "Liste Guncellendi: $(date)"
          git push
          
